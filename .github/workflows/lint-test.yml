name: Lint and Test

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pytest

      - name: Compile backend
        run: python -m py_compile main.py models.py

      - name: Pylint (errors only)
        run: pylint --errors-only main.py models.py

      - name: Run backend tests (if present)
        run: |
          if ls test_*.py tests/*.py >/dev/null 2>&1; then
            pytest -q
          else
            echo "No backend tests found; skipping pytest run."
          fi

  frontend:
    name: Frontend Lint and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build


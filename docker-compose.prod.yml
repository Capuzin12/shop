version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: buildshop
      POSTGRES_USER: buildshop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buildshop}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./server
    env_file:
      - ./.env
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./infra/nginx/buildshop.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'
    restart: unless-stopped

volumes:
  pg_data:


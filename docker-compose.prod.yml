version: '3.9'

# BuildShop Production Configuration
# Uses Supabase as external PostgreSQL database
# DATABASE_URL should be set in .env file

services:
  api:
    build:
      context: ./server
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  web:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./infra/nginx/buildshop.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'
    restart: unless-stopped

